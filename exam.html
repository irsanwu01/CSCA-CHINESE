<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CSCA Exam</title>

<style>

body{
font-family:Arial;
margin:20px;
max-width:700px;
}

#graphBox{
width:100%;
height:260px;
margin-top:10px;
}

#graph{
width:100%;
height:260px;
}

#progressBar{
width:100%;
height:8px;
background:#ccc;
margin-top:20px;
}

#progress{
height:8px;
background:#4CAF50;
width:0%;
}

#timer{
color:red;
font-size:18px;
}

</style>

</head>

<body>

<h2 id="title"></h2>

Exam Time:
<select id="examTime">
<option value="30">30 minutes</option>
<option value="45">45 minutes</option>
<option value="60" selected>60 minutes</option>
<option value="75">75 minutes</option>
<option value="90">90 minutes</option>
</select>

<div id="timer"></div>

<br>

<div id="questionBox"></div>

<div id="options"></div>

<div id="graphBox">
<canvas id="graph"></canvas>
</div>

<br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<div id="progressBar">
<div id="progress"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/exam.js"></script>

</body>
</html>
