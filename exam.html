<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Math Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/exam.js" defer></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

#questionBox{
font-size:20px;
margin-bottom:15px;
}

#options label{
display:block;
margin:6px 0;
}

button{
padding:8px 16px;
margin:5px;
}

#graph{
margin-top:20px;
border:1px solid #ccc;
}

#progressBar{
height:10px;
background:#ddd;
margin-top:15px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

</style>

</head>

<body>

<h2 id="title">Math Exam</h2>

<div id="questionBox"></div>

<div id="options"></div>

<canvas id="graph" width="420" height="300"></canvas>

<br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<div id="progressBar">
<div id="progress"></div>
</div>

</body>
</html>
