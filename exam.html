<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>CSCA Prep Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

#timer{
font-size:24px;
color:red;
margin-bottom:10px;
}

#qTimer{
font-size:14px;
color:#666;
margin-bottom:10px;
}

#nav button{
margin:2px;
width:35px;
height:35px;
}

.answered{
background:#4caf50;
color:white;
}

#progressBar{
width:420px;
height:10px;
background:#ddd;
margin-bottom:20px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

canvas{
margin-top:20px;
margin-bottom:20px;
}

button{
margin-top:10px;
padding:8px 15px;
}

</style>

</head>

<body>

<h2 id="title"></h2>

<div id="timer"></div>

<div id="qTimer"></div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox"></div>

<canvas id="graph" width="420" height="300"></canvas>

<div id="options"></div>

<br>

<div id="nav"></div>

<br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<br>

<button onclick="shareScore()">Share Score</button>

<script src="js/exam.js"></script>

</body>

</html>
