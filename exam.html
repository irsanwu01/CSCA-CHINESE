<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSCA Chinese Mathematics Exam</title>

<style>

  #graph{
max-width:420px;
height:220px;
margin-top:15px;
margin-bottom:20px;
}
  
body{
font-family:Arial;
margin:40px;
}

#questionBox{
font-size:20px;
margin-bottom:20px;
}

#options label{
display:block;
margin:10px 0;
}

button{
padding:8px 15px;
margin:10px 5px;
}

#timer{
color:red;
font-size:20px;
margin-top:5px;
}

#graph{
margin-top:30px;
}

#progressBar{
width:100%;
background:#ccc;
height:10px;
margin-top:20px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

</style>

</head>

<body>

<h2 id="title">Question</h2>

Exam Time:
<select id="examTime">
<option value="30">30 minutes</option>
<option value="45">45 minutes</option>
<option value="60" selected>60 minutes</option>
<option value="75">75 minutes</option>
<option value="90">90 minutes</option>
</select>

<div id="timer"></div>

<br>

<div id="questionBox"></div>

<div id="options"></div>

<canvas id="graph"></canvas>

<br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<div id="progressBar">
<div id="progress"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/exam.js"></script>

</body>
</html>
