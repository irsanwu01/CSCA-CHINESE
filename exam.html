<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>CSCA Prep Exam</title>

<!-- GRAPH ENGINE -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/config.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#fafafa;
}

h2{
margin-bottom:10px;
}

#timer{
font-size:24px;
color:red;
margin-bottom:5px;
}

#qTimer{
font-size:14px;
color:#555;
margin-bottom:10px;
}

#progressBar{
width:420px;
height:10px;
background:#ddd;
margin-bottom:20px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

#nav button{
margin:2px;
width:35px;
height:35px;
}

.answered{
background:#4caf50;
color:white;
}

canvas{
margin-top:20px;
margin-bottom:20px;
}

button{
margin-top:10px;
padding:8px 14px;
cursor:pointer;
}

#leaderboard{
background:white;
padding:10px;
border-radius:6px;
width:200px;
}

</style>

</head>

<body>

<h2 id="title">CSCA Exam</h2>

<div id="timer"></div>
<div id="qTimer"></div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="questionBox"></div>

<canvas id="graph" width="420" height="300"></canvas>

<div id="options"></div>

<br>

<div id="nav"></div>

<br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<br><br>

<h3>Leaderboard</h3>

<div id="leaderboard">Loading...</div>

<br>

<button onclick="shareScore()">Share Score</button>

<!-- EXAM ENGINE -->
<script src="js/exam.js"></script>

<script>

async function loadLeaderboard(){

let { data } = await supabase
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(5)

let html=""

if(data){

data.forEach((s,i)=>{

html += (i+1)+". "+s.user_email+" — "+s.score+"%<br>"

})

}

document.getElementById("leaderboard").innerHTML=html

}

loadLeaderboard()

</script>

</body>

</html>
