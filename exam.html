<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CSCA Chinese Exam</title>

<!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Chart.js untuk grafik -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Config Supabase -->
<script src="js/config.js"></script>

<!-- Exam script -->
<script src="js/exam.js" defer></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

#questionBox{
font-size:20px;
margin-bottom:20px;
}

#options label{
display:block;
margin:6px 0;
}

button{
padding:8px 16px;
margin:5px;
}

#graph{
margin-top:20px;
border:1px solid #ccc;
}

#progressBar{
height:10px;
background:#ddd;
margin-top:15px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

</style>

</head>

<body>

<h2 id="title">CSCA Chinese Mathematics Exam</h2>

<div id="questionBox"></div>

<div id="options"></div>

<canvas id="graph" width="420" height="300"></canvas>

<br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<div id="progressBar">
<div id="progress"></div>
</div>

<h3>Leaderboard</h3>

<table id="leaderboard">
<thead>
<tr>
<th>Name</th>
<th>Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

async function loadLeaderboard(){

const {data,error} = await db
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

if(error){
console.log(error)
return
}

const tbody = document.querySelector("#leaderboard tbody")

tbody.innerHTML=""

data.forEach(row=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${row.name}</td>
<td>${row.score}</td>
`

tbody.appendChild(tr)

})

}

loadLeaderboard()

</script>

</body>
</html>
