<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CSCA Chinese Mathematics Exam</title>

<script src="js/exam.js" defer></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

#questionBox{
font-size:20px;
margin-bottom:20px;
}

#options label{
display:block;
margin:6px 0;
}

button{
padding:8px 14px;
margin:5px;
}

#progressBar{
height:10px;
background:#ddd;
margin-top:20px;
}

#progress{
height:10px;
background:#4caf50;
width:0%;
}

#timer{
font-size:18px;
margin-bottom:10px;
color:red;
}

</style>

</head>

<body>

<h2 id="title">CSCA Chinese Mathematics Exam</h2>

<label>Exam Time:</label>

<select id="examTime">

<option value="30">30 minutes</option>
<option value="45">45 minutes</option>
<option value="60" selected>60 minutes</option>
<option value="75">75 minutes</option>
<option value="90">90 minutes</option>

</select>

<div id="timer"></div>

<div id="questionBox"></div>

<div id="options"></div>

<br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submitExam()">Submit</button>

<div id="progressBar">
<div id="progress"></div>
</div>

</body>
</html>
