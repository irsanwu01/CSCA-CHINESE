<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>My Exam Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

.set{
border:1px solid #ccc;
padding:10px;
margin:8px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:6px 12px;
}

</style>

</head>

<body>

<h2>My Exam Packages</h2>

<div id="sets"></div>

<script>

async function loadDashboard(){

let {data:{user}} = await db.auth.getUser()

if(!user){

location.href="login.html"
return

}

let {data:purchases} = await db
.from("user_sets")
.select("*")
.eq("user_id",user.id)

let ownedSets = purchases.map(p=>p.set_number)

let html=""

for(let i=1;i<=10;i++){

let status=""
let button=""

if(i==1){

status="FREE"
button=`<button onclick="start(${i})">Start</button>`

}else if(ownedSets.includes(i)){

status="Purchased"
button=`<button onclick="start(${i})">Start</button>`

}else{

status="Locked"
button=`<button onclick="buy(${i})">Buy Rp20.000</button>`

}

html+=`

<div class="set">

<div>
<b>Set ${i}</b>
<br>
Status: ${status}
</div>

<div>
${button}
</div>

</div>

`

}

document.getElementById("sets").innerHTML=html

}

function start(set){

location.href="exam.html?set="+set

}

function buy(set){

location.href="packages.html?set="+set

}

loadDashboard()

</script>

</body>
</html>
